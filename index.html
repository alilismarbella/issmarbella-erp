<!DOCTYPE html>
<html>
<head>
  <title>Uber Net Fare Calculator</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { margin-bottom: 10px; }
    input { padding: 5px; width: 200px; }
    button { padding: 8px 15px; margin-top: 10px; }
    .result { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>

<h2>Uber Driver Net Fare Calculator</h2>

<div class="box">
  <label>Total Earnings (Including Tips):</label><br>
  <input type="number" id="totalEarnings">
</div>

<div class="box">
  <label>Tips Amount:</label><br>
  <input type="number" id="tips">
</div>

<div class="box">
  <label>Diesel Cost:</label><br>
  <input type="number" id="diesel">
</div>

<button onclick="calculate()">Calculate</button>

<div class="result" id="output"></div>

<script>
function calculate() {
  let total = parseFloat(document.getElementById("totalEarnings").value) || 0;
  let tips = parseFloat(document.getElementById("tips").value) || 0;
  let diesel = parseFloat(document.getElementById("diesel").value) || 0;

  let tax = total * 0.06;
  let afterTax = total - tax;

  let netFare = ((afterTax - diesel) / 2) + tips;

  document.getElementById("output").innerHTML =
    "6% Tax: $" + tax.toFixed(2) + "<br>" +
    "After Tax: $" + afterTax.toFixed(2) + "<br>" +
    "Final Net Fare: $" + netFare.toFixed(2);
}
</script>

</body>
</html>
